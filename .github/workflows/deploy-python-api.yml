name: Deploy Python API to Azure

on:
  push:
    branches: [ main ]
    paths:
      - 'PY/**'
      - '.github/workflows/deploy-python-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd PY
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_PYTHON }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_PYTHON }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_PYTHON }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'era-ai-python'
          slot-name: 'Production'
          package: PY
          startup-command: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker api:app'
